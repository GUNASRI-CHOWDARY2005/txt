<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, #1e5bb8, #0a3d91);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    width: 360px;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
}

.title {
    font-size: 24px;
    font-weight: bold;
    color: #1e5bb8;
    margin-bottom: 10px;
}

.subtitle {
    font-size: 14px;
    color: gray;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg, #1e5bb8, #0a3d91);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

.footer {
    margin-top: 15px;
    font-size: 12px;
    color: gray;
}
</style>

</head>

<body>

<div class="login-box">

<div class="title">🚀 Skill Passport</div>
<div class="subtitle">AI-Based Skill Verification System</div>

<input type="text" id="user" placeholder="Enter Username">
<input type="password" id="pass" placeholder="Enter Password">

<select id="role">
    <option value="user">Candidate</option>
    <option value="recruiter">Recruiter</option>
</select>

<button onclick="login()">Login</button>

<div class="footer">Secure Login • Hackathon Demo</div>

</div>

<!-- ✅ Firebase Added -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBgGdXWnNv4hAlDfiNFWcVVUIO6Yev82yo",
  authDomain: "skillpassport-bfb8b.firebaseapp.com",
  projectId: "skillpassport-bfb8b"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// ✅ Fixed login
function login(){
    let email = document.getElementById("user").value;
    let passVal = document.getElementById("pass").value;
    let role = document.getElementById("role").value;

    auth.signInWithEmailAndPassword(email, passVal)
    .then(()=>{
        localStorage.setItem("user", email);
        localStorage.setItem("role", role);

        if(role === "recruiter"){
            window.location.href="dashboard.html";
        } else {
            window.location.href="upload.html";
        }
    })
    .catch(e=>alert(e.message));
}
</script>

</body>
</html>
